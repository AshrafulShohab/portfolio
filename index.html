<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShowHub | Breathtaking Digital Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Syne:wght@700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent-primary: #8b5cf6;
        --accent-secondary: #ec4899;
        --bg-dark: #050505;
        --mouse-x: 0;
        --mouse-y: 0;
      }
      
      html {
        scroll-behavior: smooth;
        background: var(--bg-dark);
        cursor: none; /* Hide default cursor for custom one */
      }
      
      body {
        font-family: 'Inter', sans-serif;
        color: white;
        overflow-x: hidden;
      }

      .font-display { font-family: 'Syne', sans-serif; }
      .font-tech { font-family: 'Share Tech Mono', monospace; }

      /* Noise Texture Overlay */
      .noise-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.05;
        background: url('https://grainy-gradients.vercel.app/noise.svg');
        /* Optimized filter usage */
        will-change: opacity;
      }

      /* Custom Cursor Styles */
      .cursor-dot {
        width: 8px;
        height: 8px;
        background: white;
        border-radius: 50%;
        position: fixed;
        top: 0; left: 0;
        pointer-events: none;
        z-index: 10000;
        /* Removed transition for instant tracking, handled via JS for performance */
        will-change: transform;
      }
      .cursor-outline {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        position: fixed;
        top: 0; left: 0;
        pointer-events: none;
        z-index: 9999;
        transition: width 0.3s ease, height 0.3s ease, background 0.3s ease, transform 0.15s ease-out;
        will-change: transform, width, height;
      }
      .cursor-hover .cursor-outline {
        transform: translate(-50%, -50%) scale(1.5) !important; /* Scale handled here, position via JS */
        background: rgba(255, 255, 255, 0.1);
        border-color: transparent;
      }

      /* Advanced Animations */
      @keyframes reveal-up {
        from { opacity: 0; transform: translateY(60px) scale(0.9); filter: blur(20px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      .reveal {
        opacity: 0;
      }
      .reveal.visible {
        animation: reveal-up 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }

      @keyframes morph-blob {
        0%, 100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
        34% { border-radius: 70% 30% 46% 54% / 30% 29% 71% 70%; }
        67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; }
      }

      @keyframes twinkle {
        0% { opacity: 0.2; transform: scale(0.8); }
        100% { opacity: 1; transform: scale(1.2); }
      }

      @keyframes pulse-soft {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }

      @keyframes move-blob-1 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(10%, 10%); } }
      @keyframes move-blob-2 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-10%, 15%); } }
      @keyframes move-blob-3 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(15%, -10%); } }
      @keyframes move-blob-4 { 0%, 100% { transform: translate(0, 0); } 50% { transform: translate(-15%, -15%); } }

      /* Profile Card 3D Styles */
      .pc-card-wrapper {
        perspective: 1200px;
        --rotate-x: 0deg;
        --rotate-y: 0deg;
        --pointer-x: 50%;
        --pointer-y: 50%;
      }
      .pc-card {
        position: relative;
        width: 100%;
        transform-style: preserve-3d;
        transform: rotateX(var(--rotate-x)) rotateY(var(--rotate-y));
        transition: transform 0.1s ease-out;
      }
      .pc-inside {
        position: relative;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2rem;
        padding: 2.5rem;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }
      .pc-shine {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at var(--pointer-x) var(--pointer-y), rgba(255,255,255,0.15) 0%, transparent 60%);
        pointer-events: none;
        z-index: 1;
      }
      .pc-glare {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%, rgba(255,255,255,0.05) 100%);
        pointer-events: none;
        z-index: 2;
      }
      .pc-content {
        position: relative;
        z-index: 3;
      }

      /* Snap Scroll Refinement */
      .snap-container {
        scroll-snap-type: y mandatory;
        height: 100vh;
        overflow-y: auto;
      }
      .snap-section {
        scroll-snap-align: start;
        /* Changed from height: 100vh to min-height: 100vh to allow overflow on mobile */
        min-height: 100vh;
        height: auto;
      }

      /* Logo Loop Item Styling */
      .logoloop__item {
        filter: grayscale(1) opacity(0.6);
        transition: all 0.4s ease;
      }
      .logoloop__item:hover {
        filter: grayscale(0) opacity(1);
        transform: scale(1.1);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/": "https://esm.sh/react-dom@18.2.0/",
        "react/": "https://esm.sh/react@18.2.0/",
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
    </script>
  </head>
  <body>
    <div class="noise-overlay"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
